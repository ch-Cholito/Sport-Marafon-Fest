<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SPORT-MARAFON FEST 2026 — Снаряжение</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:        #2d2757;
      --bg2:       #252050;
      --surface:   #221d4a;
      --card:      #1e1943;
      --card2:     #282260;
      --border:    #3d3770;
      --accent:    #f5c800;
      --accent2:   #d9b000;
      --accentbg:  #2a2200;
      --text:      #ffffff;
      --muted:     #8880b8;
      --done-bg:   rgba(245,200,0,.07);
      --done-text: #9a8820;
      --red:       #ff4d6a;
      --redbg:     #2a0f18;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-inner {
      max-width: 920px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      height: 72px;
    }

    /* ── Logo ── */
    .logo-wrap { display: flex; align-items: center; gap: 16px; }

    /* Т-Банк shield */
    .tbank-logo {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }
    .tbank-shield {
      width: 34px;
      height: 38px;
      flex-shrink: 0;
    }
    .tbank-text {
      font-size: 18px;
      font-weight: 900;
      color: #fff;
      letter-spacing: .04em;
      text-transform: uppercase;
    }

    /* divider */
    .logo-divider {
      width: 1px;
      height: 36px;
      background: var(--border);
      flex-shrink: 0;
    }

    /* SMF lettering */
    .smf-logo {
      display: flex;
      flex-direction: column;
      line-height: 1;
      gap: 1px;
    }
    .smf-line {
      display: flex;
      align-items: center;
      gap: 7px;
    }
    .smf-word {
      font-size: 16px;
      font-weight: 900;
      color: #fff;
      letter-spacing: .04em;
      text-transform: uppercase;
    }
    /* small mountain icon between SPORT and MARAFON */
    .smf-icon {
      flex-shrink: 0;
      opacity: .85;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    .pill {
      background: rgba(255,255,255,.08);
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .04em;
    }
    .pill-year {
      background: var(--accentbg);
      border-color: #5a4800;
      color: var(--accent);
      font-weight: 700;
    }

    /* ── Progress ── */
    .progress-wrap {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
    }
    .progress-inner { max-width: 920px; margin: 0 auto; }
    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .progress-pct { color: var(--accent); font-weight: 700; font-size: 13px; }
    .progress-track { height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent2), var(--accent));
      border-radius: 3px;
      transition: width .5s cubic-bezier(.4,0,.2,1);
    }

    /* ── Main ── */
    main { max-width: 920px; margin: 0 auto; padding: 28px 24px 100px; }

    /* ── Filters ── */
    .filter-row {
      display: flex;
      gap: 6px;
      margin-bottom: 24px;
      flex-wrap: wrap;
      align-items: center;
    }
    .filter-tab {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 8px;
      padding: 7px 14px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: all .15s;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .filter-tab:hover { border-color: var(--accent); color: var(--text); }
    .filter-tab.active { background: var(--accent); border-color: var(--accent); color: #1a1500; font-weight: 700; }
    .filter-tab .cnt { background: rgba(0,0,0,.15); border-radius: 10px; padding: 1px 7px; font-size: 11px; }
    .filter-tab:not(.active) .cnt { background: var(--border); color: var(--muted); }
    .filter-spacer { flex: 1; }
    .btn-manage {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 8px;
      padding: 7px 14px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all .15s;
    }
    .btn-manage:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Category section ── */
    .cat-section {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      margin-bottom: 12px;
      overflow: hidden;
    }
    .cat-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px;
      cursor: pointer;
      user-select: none;
      transition: background .15s;
      border-bottom: 1px solid transparent;
    }
    .cat-header:hover { background: var(--card2); }
    .cat-section.open .cat-header { border-bottom-color: var(--border); }
    .cat-emoji { font-size: 18px; line-height: 1; }
    .cat-name-label {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: .05em;
      text-transform: uppercase;
      color: var(--text);
      flex: 1;
    }
    .cat-stats {
      font-size: 11px;
      color: var(--muted);
      background: var(--border);
      border-radius: 10px;
      padding: 2px 8px;
    }
    .cat-stats.all-done { background: var(--accentbg); color: var(--accent); }
    .cat-chevron { color: var(--muted); transition: transform .2s; flex-shrink: 0; }
    .cat-section.open .cat-chevron { transform: rotate(180deg); }
    .cat-actions { display: flex; gap: 4px; margin-right: 2px; }
    .cat-action-btn {
      background: transparent;
      border: none;
      color: var(--muted);
      cursor: pointer;
      padding: 5px;
      border-radius: 5px;
      display: flex;
      align-items: center;
      transition: all .15s;
      opacity: 0;
    }
    .cat-header:hover .cat-action-btn { opacity: 1; }
    .cat-action-btn:hover { background: var(--border); color: var(--text); }
    .cat-action-btn.del:hover { background: var(--redbg); color: var(--red); }

    /* ── Cat body ── */
    .cat-body { display: none; }
    .cat-section.open .cat-body { display: block; }

    /* ── Item ── */
    .item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      transition: background .12s;
    }
    .item:last-child { border-bottom: none; }
    .item:hover { background: var(--card2); }
    .item.done .item-name { text-decoration: line-through; color: var(--muted); }
    .item.done { background: var(--done-bg); }

    .checkbox {
      width: 22px; height: 22px;
      border: 2px solid var(--border);
      border-radius: 6px;
      flex-shrink: 0;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .15s;
    }
    .checkbox:hover { border-color: var(--accent); }
    .item.done .checkbox { background: var(--accent); border-color: var(--accent); }
    .check-svg { display: none; }
    .item.done .check-svg { display: block; }

    .item-name { flex: 1; font-size: 14px; font-weight: 500; transition: color .15s; }
    .badge-req {
      font-size: 10px; font-weight: 700; letter-spacing: .06em;
      color: var(--accent); background: var(--accentbg);
      border: 1px solid #4a3800; border-radius: 4px;
      padding: 2px 6px; white-space: nowrap; flex-shrink: 0;
    }
    .item-del {
      width: 26px; height: 26px;
      border: none; background: transparent;
      color: var(--muted); cursor: pointer;
      border-radius: 5px; display: flex; align-items: center; justify-content: center;
      opacity: 0; transition: opacity .15s, color .15s, background .15s; flex-shrink: 0;
    }
    .item:hover .item-del { opacity: 1; }
    .item-del:hover { color: var(--red); background: var(--redbg); }

    /* ── Add item row ── */
    .add-item-row {
      display: flex;
      gap: 8px;
      padding: 10px 16px;
      background: rgba(0,0,0,.15);
      border-top: 1px solid var(--border);
    }
    .add-item-input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 7px;
      padding: 8px 12px;
      font-size: 13px;
      font-family: inherit;
      outline: none;
      transition: border-color .15s;
    }
    .add-item-input:focus { border-color: var(--accent); }
    .add-item-input::placeholder { color: var(--muted); }
    .add-item-btn {
      background: var(--accent);
      color: #1a1500;
      border: none;
      border-radius: 7px;
      padding: 8px 16px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      white-space: nowrap;
      transition: background .15s;
    }
    .add-item-btn:hover { background: var(--accent2); }

    /* ── Empty ── */
    .empty-state { text-align: center; padding: 50px 20px; color: var(--muted); }
    .empty-icon { font-size: 36px; margin-bottom: 10px; }
    .empty-text { font-size: 13px; }

    /* ── Modal ── */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(20,16,50,.88);
      backdrop-filter: blur(6px);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
      width: 100%;
      max-width: 480px;
      margin: 20px;
      max-height: 90vh;
      overflow-y: auto;
    }
    .modal-title { font-size: 16px; font-weight: 700; margin-bottom: 20px; }
    .modal-cats-list { margin-bottom: 16px; }
    .modal-cat-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 6px;
    }
    .modal-cat-emoji-input, .modal-cat-name-input {
      background: transparent; border: none;
      color: var(--text); font-family: inherit; outline: none;
    }
    .modal-cat-emoji-input { font-size: 18px; width: 32px; text-align: center; }
    .modal-cat-name-input { flex: 1; font-size: 13px; font-weight: 500; }
    .modal-cat-del {
      background: transparent; border: none;
      color: var(--muted); cursor: pointer;
      padding: 4px; border-radius: 5px;
      display: flex; align-items: center; transition: all .15s;
    }
    .modal-cat-del:hover { color: var(--red); background: var(--redbg); }
    .modal-section-label { font-size: 11px; font-weight: 700; letter-spacing: .08em; color: var(--muted); text-transform: uppercase; margin-bottom: 8px; }
    .modal-add-row { display: flex; gap: 8px; margin-bottom: 20px; }
    .modal-input {
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text); border-radius: 8px;
      padding: 9px 12px; font-size: 13px;
      font-family: inherit; outline: none; transition: border-color .15s;
    }
    .modal-input:focus { border-color: var(--accent); }
    .modal-emoji-in { width: 56px; text-align: center; font-size: 16px; }
    .modal-name-in { flex: 1; }
    .modal-add-btn {
      background: var(--accent); color: #1a1500;
      border: none; border-radius: 8px;
      padding: 9px 16px; font-size: 12px; font-weight: 700;
      cursor: pointer; font-family: inherit; white-space: nowrap; transition: background .15s;
    }
    .modal-add-btn:hover { background: var(--accent2); }
    .modal-footer { display: flex; justify-content: flex-end; gap: 10px; }
    .btn-secondary {
      background: var(--surface); border: 1px solid var(--border);
      color: var(--muted); border-radius: 8px;
      padding: 9px 18px; font-size: 13px; font-weight: 600;
      cursor: pointer; font-family: inherit; transition: all .15s;
    }
    .btn-secondary:hover { border-color: var(--text); color: var(--text); }
    .btn-primary {
      background: var(--accent); border: none;
      color: #1a1500; border-radius: 8px;
      padding: 9px 20px; font-size: 13px; font-weight: 700;
      cursor: pointer; font-family: inherit; transition: background .15s;
    }
    .btn-primary:hover { background: var(--accent2); }

    @media (max-width: 600px) {
      .header-right { display: none; }
      .tbank-text { font-size: 15px; }
      .smf-word { font-size: 13px; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo-wrap">

      <!-- Т-Банк логотип -->

<!-- Progress -->
<div class="progress-wrap">

<script>
// ── IndexedDB ──────────────────────────────────────────────────────
const DB_NAME = 'smf2026v3', DB_VER = 1;
let db;
function openDB() {
  return new Promise((res,rej) => {
    const req = indexedDB.open(DB_NAME, DB_VER);
    req.onupgradeneeded = e => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains('categories'))
        d.createObjectStore('categories', {keyPath:'id',autoIncrement:true});
      if (!d.objectStoreNames.contains('items'))
        d.createObjectStore('items', {keyPath:'id',autoIncrement:true});
    };
    req.onsuccess = e => { db = e.target.result; res(); };
    req.onerror = e => rej(e.target.error);
  });
}
const idb = {
  all:  name =>      new Promise((res,rej)=>{const r=db.transaction(name).objectStore(name).getAll();r.onsuccess=e=>res(e.target.result);r.onerror=e=>rej(e);}),
  put:  (name,obj) =>new Promise((res,rej)=>{const r=db.transaction(name,'readwrite').objectStore(name).put(obj);r.onsuccess=e=>res(e.target.result);r.onerror=e=>rej(e);}),
  add:  (name,obj) =>new Promise((res,rej)=>{const r=db.transaction(name,'readwrite').objectStore(name).add(obj);r.onsuccess=e=>res(e.target.result);r.onerror=e=>rej(e);}),
  del:  (name,id) => new Promise((res,rej)=>{const r=db.transaction(name,'readwrite').objectStore(name).delete(id);r.onsuccess=()=>res();r.onerror=e=>rej(e);}),
};

  {ci:6,name:'Солнцезащитный крем',req:false},
  {ci:6,name:'Средство от насекомых',req:false},
  {ci:6,name:'Запасной пакет / мусорный мешок',req:false},
];
async function seedIfEmpty() {
  const cats = await idb.all('categories');
  if (cats.length > 0) return;
  const ids = [];
  for (const c of SEED_CATS) ids.push(await idb.add('categories',{name:c.name,emoji:c.emoji}));
  for (const it of SEED_ITEMS)
    await idb.add('items',{name:it.name,category_id:ids[it.ci],done:false,required:it.req,ts:Date.now()});
}

// ── State ─────────────────────────────────────────────────────────
let categories=[], items=[], filter='all';

// ── SVG snippets ──────────────────────────────────────────────────
const checkSVG = `<svg class="check-svg" width="12" height="9" viewBox="0 0 12 9" fill="none"><path d="M1 4L4.5 7.5L11 1" stroke="#1a1400" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
const chevronSVG = `<svg class="cat-chevron" width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3 5l4 4 4-4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
const trashSVG = `<svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M1 3h11M4 3V2h5v1M5 6v4M8 6v4M2 3l1 8h7l1-8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

// ── Render ────────────────────────────────────────────────────────
function updateProgress() {
  const total=items.length, done=items.filter(i=>i.done).length;
  const pct = total ? Math.round(done/total*100) : 0;
  document.getElementById('progressText').textContent = `${done} из ${total} вещей собрано`;
  document.getElementById('progressPct').textContent  = pct+'%';
  document.getElementById('progressFill').style.width = pct+'%';
  document.getElementById('cnt-all').textContent  = total;
  document.getElementById('cnt-todo').textContent = total-done;
  document.getElementById('cnt-done').textContent = done;
}

function renderList() {
  updateProgress();
  const listEl = document.getElementById('list');
  const filtered = filter==='all' ? items : filter==='done' ? items.filter(i=>i.done) : items.filter(i=>!i.done);

  // remember open sections
  const openIds = new Set();
  document.querySelectorAll('.cat-section.open').forEach(el=>openIds.add(+el.dataset.catid));

  if (!filtered.length) {
    listEl.innerHTML = `<div class="empty-state"><div class="empty-icon">${filter==='done'?'🎯':'📦'}</div><div class="empty-text">${filter==='done'?'Ничего не отмечено':filter==='todo'?'Всё собрано — на старт!':'Список пуст'}</div></div>`;
    return;
  }

  listEl.innerHTML = categories.map(cat => {
    const its = filtered.filter(i=>i.category_id===cat.id);
    const totalInCat = items.filter(i=>i.category_id===cat.id).length;
    if (its.length===0 && filter!=='all') return '';
    const doneInCat = items.filter(i=>i.category_id===cat.id&&i.done).length;
    const allDone = totalInCat>0 && doneInCat===totalInCat;
    const isOpen = openIds.size===0 || openIds.has(cat.id);
    return `
    <div class="cat-section${isOpen?' open':''}" data-catid="${cat.id}">
      <div class="cat-header" onclick="toggleSection(this)">
        <span class="cat-emoji">${cat.emoji}</span>
        <span class="cat-name-label">${esc(cat.name)}</span>
        <span class="cat-stats${allDone?' all-done':''}">${doneInCat}/${totalInCat}</span>
        <div class="cat-actions" onclick="event.stopPropagation()">
          <button class="cat-action-btn del" title="Удалить категорию" onclick="deleteCat(${cat.id})">${trashSVG}</button>
        </div>
        ${chevronSVG}
      </div>
      <div class="cat-body">
        ${its.length===0 ? `<div style="padding:14px 16px;color:var(--muted);font-size:13px">Нет вещей — добавь ниже</div>` : ''}
        ${its.map(it=>`
        <div class="item${it.done?' done':''}" data-id="${it.id}">
          <div class="checkbox" onclick="toggleItem(${it.id})">${checkSVG}</div>
          <span class="item-name">${esc(it.name)}</span>
          ${it.required?'<span class="badge-req">ОБЯЗАТЕЛЬНО</span>':''}
          <button class="item-del" onclick="deleteItem(${it.id})">${trashSVG}</button>
        </div>`).join('')}
        <div class="add-item-row">
          <input class="add-item-input" type="text"
            placeholder="Добавить в «${esc(cat.name)}»..."
            maxlength="100"
            onkeydown="if(event.key==='Enter')addItemInCat(${cat.id},this)" />
          <button class="add-item-btn" onclick="addItemInCat(${cat.id},this.previousElementSibling)">+ Добавить</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function toggleSection(h) { h.closest('.cat-section').classList.toggle('open'); }

// ── Actions ───────────────────────────────────────────────────────
async function toggleItem(id) {
  const it=items.find(i=>i.id===id); if(!it)return;
  it.done=!it.done; await idb.put('items',it); renderList();
}
async function deleteItem(id) {
  await idb.del('items',id); items=items.filter(i=>i.id!==id); renderList();
}
async function deleteCat(catId) {
  if(!confirm('Удалить категорию и все вещи в ней?'))return;
  for(const it of items.filter(i=>i.category_id===catId)) await idb.del('items',it.id);
  items=items.filter(i=>i.category_id!==catId);
  await idb.del('categories',catId);
  categories=categories.filter(c=>c.id!==catId);
  renderList();
}
async function addItemInCat(catId, input) {
  const name=input.value.trim(); if(!name){input.focus();return;}
  const newId=await idb.add('items',{name,category_id:catId,done:false,required:false,ts:Date.now()});
  items.push({id:newId,name,category_id:catId,done:false,required:false,ts:Date.now()});
  // keep section open
  const sec=input.closest('.cat-section'); if(sec) sec.classList.add('open');
  input.value='';
  renderList();
  setTimeout(()=>{
    const ni=document.querySelector(`.cat-section[data-catid="${catId}"] .add-item-input`);
    if(ni) ni.focus();
  },50);
}

// ── Filters ───────────────────────────────────────────────────────
document.querySelectorAll('.filter-tab').forEach(btn=>{
  btn.addEventListener('click',()=>{
    filter=btn.dataset.filter;
    document.querySelectorAll('.filter-tab').forEach(b=>b.classList.toggle('active',b===btn));
    renderList();
  });
});

// ── Modal ─────────────────────────────────────────────────────────
let modalEdits=[];
function openModal() {
  modalEdits=categories.map(c=>({id:c.id,emoji:c.emoji,name:c.name}));
  renderModalList();
  document.getElementById('modalOverlay').classList.add('open');
  document.getElementById('newCatEmoji').value='';
  document.getElementById('newCatName').value='';
}
function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }
function overlayClick(e) { if(e.target===document.getElementById('modalOverlay'))closeModal(); }

function renderModalList() {
  document.getElementById('modalCatList').innerHTML = modalEdits.map((c,i)=>`
    <div class="modal-cat-row">
      <input class="modal-cat-emoji-input" type="text" value="${esc(c.emoji)}" maxlength="2"
        oninput="modalEdits[${i}].emoji=this.value" />
      <input class="modal-cat-name-input" type="text" value="${esc(c.name)}" maxlength="40"
        oninput="modalEdits[${i}].name=this.value" />
      <button class="modal-cat-del" onclick="removeModalCat(${i})">${trashSVG}</button>
    </div>`).join('');
}
function removeModalCat(idx) { modalEdits.splice(idx,1); renderModalList(); }
function addCategory() {
  const emoji=document.getElementById('newCatEmoji').value.trim()||'📦';
  const name=document.getElementById('newCatName').value.trim();
  if(!name){document.getElementById('newCatName').focus();return;}
  modalEdits.push({id:null,emoji,name});
  document.getElementById('newCatEmoji').value='';
  document.getElementById('newCatName').value='';
  renderModalList();
}
async function saveCategories() {
  const saved=[];
  for(const edit of modalEdits) {
    const rec={emoji:edit.emoji||'📦',name:edit.name};
    if(edit.id){rec.id=edit.id;await idb.put('categories',rec);saved.push(rec);}
    else{const newId=await idb.add('categories',rec);saved.push({...rec,id:newId});}
  }
  const savedIds=new Set(saved.map(c=>c.id));
  for(const old of categories) {
    if(!savedIds.has(old.id)) {
      for(const it of items.filter(i=>i.category_id===old.id)) await idb.del('items',it.id);
      items=items.filter(i=>i.category_id!==old.id);
      await idb.del('categories',old.id);
    }
  }
  categories=saved;
  closeModal();
  renderList();
}

// ── Init ──────────────────────────────────────────────────────────
async function init() {
  await openDB();
  await seedIfEmpty();
  categories=await idb.all('categories');
  items=await idb.all('items');
  renderList();
}
init().catch(console.error);
</script>
</body>
</html>
